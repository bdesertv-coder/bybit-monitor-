services:

  db:
    image: postgres:15
    user: postgres                    # ← добавь (фикс Permission denied)
    environment:
      POSTGRES_DB: bybit_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/bybit_monitor
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bybit_monitor
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      PYTHONPATH: /app
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
         #docker compose down -v
      #docker compose up --build